services:
  - type: web
    name: gazarzar-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: gazarzar-uploads
      mountPath: /data/uploads
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gazarzar-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: UPLOAD_DIR
        value: "/data/uploads"

databases:
  - name: gazarzar-db
    databaseName: gazarzar
    user: gazarzar
    plan: free
